tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Categories
  - name: Transactions
  - name: Dashboard

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        '200':
          description: Service is healthy

  /api/v1/health:
    get:
      tags: [Health]
      summary: API v1 health check
      responses:
        '200':
          description: API is healthy

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register viewer account
      responses:
        '201':
          description: Account created
        '400':
          description: Validation error

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched
        '401':
          description: Unauthorized
    put:
      tags: [Auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /api/v1/auth/me/password:
    put:
      tags: [Auth]
      summary: Change current user password
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Password changed
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid refresh token

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      tags: [Users]
      summary: Create user (admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user by id (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      tags: [Users]
      summary: Update user (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      tags: [Users]
      summary: Soft delete user (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/users/{id}/role:
    patch:
      tags: [Users]
      summary: Update user role (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/users/{id}/status:
    patch:
      tags: [Users]
      summary: Update user status (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/users/{id}/hard:
    delete:
      tags: [Users]
      summary: Hard delete user (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User permanently deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/categories:
    get:
      tags: [Categories]
      summary: List categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories fetched
        '401':
          description: Unauthorized
    post:
      tags: [Categories]
      summary: Create category (admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Category created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/categories/{id}:
    get:
      tags: [Categories]
      summary: Get category by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category fetched
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      tags: [Categories]
      summary: Update category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags: [Categories]
      summary: Delete category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transactions fetched
        '401':
          description: Unauthorized
    post:
      tags: [Transactions]
      summary: Create transaction (admin or analyst)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Transaction created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction fetched
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      tags: [Transactions]
      summary: Update transaction (admin or analyst)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags: [Transactions]
      summary: Soft delete transaction (admin or analyst)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/transactions/{id}/hard:
    delete:
      tags: [Transactions]
      summary: Hard delete transaction (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction permanently deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/transactions/{id}/restore:
    patch:
      tags: [Transactions]
      summary: Restore transaction (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction restored
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary metrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Summary fetched
        '401':
          description: Unauthorized

  /api/v1/dashboard/category-breakdown:
    get:
      tags: [Dashboard]
      summary: Category expense breakdown
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Breakdown fetched
        '401':
          description: Unauthorized

  /api/v1/dashboard/recent-activity:
    get:
      tags: [Dashboard]
      summary: Recent transaction activity
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recent activity fetched
        '401':
          description: Unauthorized

  /api/v1/dashboard/monthly-trends:
    get:
      tags: [Dashboard]
      summary: Monthly trends (admin or analyst)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Monthly trends fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/dashboard/weekly-trends:
    get:
      tags: [Dashboard]
      summary: Weekly trends (admin or analyst)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Weekly trends fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/dashboard/top-categories:
    get:
      tags: [Dashboard]
      summary: Top categories (admin or analyst)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Top categories fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/dashboard/comparison:
    get:
      tags: [Dashboard]
      summary: Current period comparison (admin or analyst)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Comparison fetched
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
